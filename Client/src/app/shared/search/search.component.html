<div class="elearn-search">
    <input class="elearn-search-input" type="text" #searchInput placeholder="Search..." />
    <button class="btn btn-search" (click)="onSearch(searchInput.value)">Search</button>
</div>
<div class="elearn-search-result-for" *ngIf="searchText !==''">
    <p><strong>Search result for: </strong>{{ searchText }}</p>
</div>
