<div class="elearn--skill--details--info scroll">
    <div class="elearn-skill-detail-close">
        <i class="fa fa-times" aria-hidden="true"></i>
    </div>
    <div class="elearn-skill-detail-image">
        <img src="{{skill.icon}}" class="elearn-skill-detail-image" alt="{{skill.name}}" />
    </div>

    <div class="elearn-skill-detail">
        <div class="elearn-skill-detail-name">
            <h2>{{skill.name}}</h2>
        </div>
        <div class="elearn-skill-detail-gbc">
            <span>Experience : {{skill.experience}}+ years</span>
            <span *ngIf="skill.isCertified">Certified Year : {{skill.certifiedYear || 'N/A'}}</span>
        </div>
        <div class="elearn-skill-detail-price">
            <p>
                <span [ngStyle]="{ 'background-color': skill.isCertified ? 'green' : 'red', 'color': 'white' }">
                    {{ skill.isCertified ? "Certified" : "Not Certified" }}
                </span>
                <ng-container *ngIf="skill.isCertified && skill.certificateURL">
                    <a href="{{skill.certificateURL}}" [ngStyle]="" target="_blank">View Certificate</a>
                </ng-container>
                <ng-container *ngIf="skill.isCertified && skill.certificateImage">
                    <a href="{{skill.certificateImage}}" [ngStyle]="" target="_blank">View Certificate Image</a>
                </ng-container>
            </p>
        </div>

        <div class="elearn-skill-detail-desc">
            <div style="padding: 5px 0px;border-bottom: #ccc 2px solid">
                <h4>Skill Description</h4>
            </div>
            <div style="margin-top: 20px">
                <p>{{skill.description}}</p>
            </div>
        </div>
    </div>
</div>
<div class="overlay"></div>
